<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Learn2Learn</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
(function(){
    const saved = localStorage.getItem("l2l-theme") || "dark";
    if(saved === "light") document.body.classList.add("light");
})();
</script>

<nav class="page-nav">
    <a href="index.html" class="brand">Learn2Learn</a>
    <button class="page-theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️ Light</button>
    <a href="match.html" class="back">← View Match</a>
</nav>

<div class="page dashboard-page">
<div class="dashboard-wrap">

    <div class="dashboard-topbar">
        <div>
            <div class="eyebrow">Student Dashboard</div>
            <h1 class="page-title">Your <span>Progress</span></h1>
        </div>
        <div class="notif-chip">
            <span style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;flex-shrink:0;"></span>
            New Match Found
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="num" data-target="12">0</div>
            <div class="lbl">Sessions Completed</div>
        </div>
        <div class="stat-card">
            <div class="num" data-target="3">0</div>
            <div class="lbl">Subjects Improved</div>
        </div>
        <div class="stat-card">
            <div class="num" data-target="5">0</div>
            <div class="lbl">Learning Partners</div>
        </div>
    </div>

    <div class="progress-card">
        <h2>📊 Learning Progress</h2>

        <div class="progress-item">
            <div class="progress-row">
                <span class="progress-subject">Information Management 1</span>
                <span class="progress-pct">80%</span>
            </div>
            <div class="prog-track"><div class="prog-fill" data-width="80"></div></div>
        </div>

        <div class="progress-item">
            <div class="progress-row">
                <span class="progress-subject">Fundamentals of Electronics</span>
                <span class="progress-pct">55%</span>
            </div>
            <div class="prog-track"><div class="prog-fill" data-width="55"></div></div>
        </div>

        <div class="progress-item">
            <div class="progress-row">
                <span class="progress-subject">Network Technologies 1</span>
                <span class="progress-pct">70%</span>
            </div>
            <div class="prog-track"><div class="prog-fill" data-width="70"></div></div>
        </div>

    </div>

</div>
</div>

<script>
function toggleTheme(){
    const isLight = document.body.classList.contains("light");
    const next = isLight ? "dark" : "light";
    localStorage.setItem("l2l-theme", next);
    document.body.classList.toggle("light", next === "light");
    document.getElementById("themeToggle").textContent = next === "light" ? "🌙 Dark" : "☀️ Light";
}
document.getElementById("themeToggle").textContent =
    document.body.classList.contains("light") ? "🌙 Dark" : "☀️ Light";

// Animate counters
document.querySelectorAll(".num[data-target]").forEach(el => {
    const target = +el.dataset.target;
    let current  = 0;
    const step   = Math.ceil(target / 30);
    const timer  = setInterval(() => {
        current = Math.min(current + step, target);
        el.textContent = current;
        if(current >= target) clearInterval(timer);
    }, 40);
});

// Animate progress bars
window.addEventListener("load", () => {
    setTimeout(() => {
        document.querySelectorAll(".prog-fill[data-width]").forEach(el => {
            el.style.width = el.dataset.width + "%";
        });
    }, 300);
});
</script>
</body>
</html>
